teaching:
  topics:
    - title: "Interiors of Earth, solar-system planets, and exoplanets"
      text: "Planetary interiors, including rocky planets, ice giants, gas giants, carbon planets, water world exoplanets, hydrogen world exoplanets, super-Earths, and sub-Neptunes."
    - title: "Mineral physics and mineralogy"
      text: "Planetary Materials, Structure of Earth Materials, Introduction to Mineral Physics, Mineral spectroscopy and crystallography, and Phase Transitions in the Mantle."
    - title: "Knowledge creation and management"
      text: "Development of new scientific knowledge by combining a range of AI/LLM tools."
    - title: "Data analysis"
      text: "Coding for exploration, Python for Earth Science, Python for Graduate Research, and Data and Computation."
    - title: "Other courses"
      text: "Introduction to Geology, The Core-Mantle Boundary, Volatiles and Ices in Earth and Planets, and Hydrogen: From Planetary To Energy Sciences."

