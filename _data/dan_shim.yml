hero:
  name_html: "S.-H. Dan Shim<br>심 상 헌"
  lead: "Mineralogist, materials scientist, planetary scientist, astrobiologist, and geophysicist studying planetary interiors through experiments under extreme conditions."
  image_url: "https://webapp4.asu.edu/photo-ws/directory_photo/sshim5?blankImage2=1&size=large"
  image_alt: "Portrait of S.-H. Dan Shim"

overview_sections:
  - title: "Research profile"
    open: true
    text: "As a mineralogist and materials scientist, I study the behavior of planetary interiors under extreme conditions using experimental and computational methods. As a planetary scientist and geophysicist, I use these findings to understand the evolution and dynamics of planets. My work in comparative planetary science also involves collaboration with seismologists, geodynamicists, planetary scientists, and astrophysicists to explore how material processes in planetary interiors shape the chemical and physical evolution of planets."
  - title: "Teaching and mentoring"
    text: "I create educational content using an open-source computational framework and large language model productivity tools. I am passionate about teaching data analysis, computation, and knowledge development, and I am deeply interested in connecting research and education."
    link:
      label: "Open teaching page"
      url: "dan-shim-teaching.html"
  - title: "Affiliations"
    html: "<a class=\"text-link\" href=\"https://sese.asu.edu/\">School of Earth and Space Exploration</a>, <a class=\"text-link\" href=\"https://motu.asu.edu/\">Materials of the Universe</a>, and <a class=\"text-link\" href=\"https://force.asu.edu/\">FORCE at ASU</a>."

