hero:
  title: "Resources"
  lead: "We have developed some useful research tools and career development contents."
  image: "assets/images/magma-ocean-gogh-style-rising-magma.png"
  image_alt: "Stylized magma ocean artwork"

software:
  lead: "These software packages were developed for handling and analyzing large datasets from high-pressure experiments and are free for non-commercial use."
  github_home: "https://github.com/SHDShim"
  items:
    - title: "PeakPo"
      description: "Data-analysis environment for peak identification, peak fitting, and unit-cell refinement with 1D and 2D powder diffraction data, designed for quick navigation through large synchrotron datasets."
      links:
        - label: "App"
          url: "https://drive.google.com/drive/folders/0B0kkQLbYpQDYfnlZZ09wcXltTjhRUDMydkx4R3o4TTUxcXlsTHJHOGlsNXo1ZkJUZ2JlWFk?resourcekey=0-Y-yblW6lsAIfbyA8qKrUmQ&usp=sharing"
        - label: "Python code"
          url: "https://github.com/SHDShim/peakpo-v7"
        - label: "Manual"
          url: "https://github.com/SHDShim/PeakPo/wiki"
        - label: "Installation"
          url: "https://github.com/SHDShim/PeakPo/wiki/Quick-Install"
        - label: "Jupyter notebooks"
          url: "https://github.com/SHDShim/PeakPo/tree/master/jnb-tools"
    - title: "RamPo"
      description: "Desktop application for processing Raman spectroscopy data, adapted from PeakPo and refocused for high-pressure Raman experiments."
      links:
        - label: "GitHub repository"
          url: "https://github.com/SHDShim/RamPo"
    - title: "Pytheos"
      description: "Flexible tools for pressure-scale calculations, pressure conversion, and fitting pressure-volume and pressure-volume-temperature datasets to a range of equations and combinations."
      links:
        - label: "GitHub repository"
          url: "https://github.com/SHDShim/pytheos"
        - label: "Documentation"
          url: "https://shdshim.github.io/pytheos-docs/"
        - label: "Jupyter notebooks"
          url: "https://github.com/SHDShim/pytheos/tree/master/examples"
    - title: "Dioptas-Batch-GUI"
      description: "Standalone GUI for automated batch processing of X-ray diffraction image files using Dioptas."
      links:
        - label: "GitHub repository"
          url: "https://github.com/SHDShim/dioptase_batch_gui"
    - title: "Calculator-for-H-in-FeHx"
      description: "Notebook for calculating hydrogen content in FeHx alloys from alloy volume expansion using the DFT-based approach described in Piet et al. (2023, GRL)."
      links:
        - label: "Jupyter notebook"
          url: "https://github.com/SHDShim/Calculator-for-H-in-FeHx"
    - title: "UnitCellJ"
      description: "A Jupyter notebook version of the original UnitCell app, providing a robust outlier-finding scheme for improved unit-cell fitting."
      links:
        - label: "Jupyter notebook"
          url: "https://github.com/SHDShim/UnitCellJ"
    - title: "BM-Spline"
      description: "Demonstrates fast and accurate inverse Birch-Murnaghan equation fitting using a universal spline-function approach."
      links:
        - label: "Jupyter notebook"
          url: "https://github.com/SHDShim/BM-spline"
    - title: "JCPDSTools"
      description: "Utilities to create JCPDS files from CIFs, edit existing JCPDS files, and check them for errors to support stable use with PeakPo and Dioptas."
      links:
        - label: "App"
          url: "https://drive.google.com/drive/folders/1QRP499DYnYGKkv52Og37IoTalfUJA8uE?usp=sharing"
        - label: "Python code"
          url: "https://github.com/SHDShim/JCPDSTools"
    - title: "PRuby"
      description: "A lightweight utility for calculating pressure from ruby fluorescence peak positions, designed to respond quickly and run easily from portable drives."
      links:
        - label: "App"
          url: "https://drive.google.com/open?id=0B0kkQLbYpQDYfjBGT21uMkx5cU1JMHJIUUhGR1FkdDVUdzFYVUdKR0Zya2NRcFYtUmRVUGM"

