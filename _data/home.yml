hero:
  title: "Exo-Materials Research"
  subtitle: "Earth, Mars, Venus, Super-Earths, Uranus, Neptune, and Sub-Neptunes"

intro:
  paragraphs:
    - "What materials make up planets? How do these materials behave under the extreme temperatures and pressures found in planetary interiors? Do the properties of these materials impact a planet's chemical processes and dynamics? How do internal processes affect surface environment, atmosphere, and habitability?"
    - "Our research aims to understand the internal structures and processes of various planets, including Earth, the planets of our solar system, and exoplanets, by examining the properties and behaviors of their constituent materials. These materials include hydrogen, water, silicates, oxides, hydroxides, carbides, hydrides, and metal alloys. To replicate the high-pressure and high-temperature conditions found within planetary interiors, we use a variety of techniques such as the laser-heated diamond-anvil cell, multi-anvil press, and dynamic compression. To analyze the properties and behaviors of these materials, we employ a range of methods, including X-ray diffraction (both synchrotron and XFEL), X-ray spectroscopy (both synchrotron and XFEL), infrared spectroscopy, Raman spectroscopy, electron microscopy, mass spectrometry, and density functional theory."

